name: validate-pr

on:
  pull_request:
    branches: [main]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data files
        run: python scripts/validate_data.py

      - name: Verify plugin discovery
        run: |
          python -c "
          from analyses import discover_plugins
          plugins = discover_plugins()
          print(f'{len(plugins)} plugins discovered')
          for p in plugins:
              print(f'  {p.icon} {p.title} [{p.category}]')
          assert len(plugins) >= 2, 'Expected at least 2 plugins'
          "
