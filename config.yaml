# Bracket analysis configuration

data_dir: "data"

app:
  my_player_name: ""  # set to your display name to highlight your row on the home screen

# Live AI layer (Phase 4) — Claude tool-use generation for page copy + chat.
# All keys optional. Set enabled: false to fall back to template copy everywhere.
ai:
  enabled: true               # master switch for live AI calls
  cache_enabled: true         # cache page copy by (lens, viewer, data_hash); chat is never cached
  cache_dir: "data/content/cache"
  audit_dir: "data/ai_audit"

# Data sources (for reference — data is maintained manually)
sources:
  espn_group: "https://fantasy.espn.com/games/tournament-challenge-bracket-2026/group?id=5c58b8ab-f641-4c0a-8508-461911cc542f"
  draftkings: "https://sportsbook.draftkings.com/leagues/basketball/ncaab"
